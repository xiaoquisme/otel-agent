schema_version: "1.0"

extension:
  id: bugfix
  name: "Bugfix Workflow"
  version: "1.0.0"
  description: "Structured bugfix workflow — capture bugs, trace to spec artifacts, and patch specs surgically"
  author: "Quratulain-bilal"
  repository: "https://github.com/Quratulain-bilal/spec-kit-bugfix"
  license: "MIT"

requires:
  speckit_version: ">=0.4.0"

provides:
  commands:
    - name: speckit.bugfix.report
      file: commands/speckit.bugfix.report.md
      description: "Capture a bug and trace it back to the relevant spec, plan, and task artifacts"
    - name: speckit.bugfix.patch
      file: commands/speckit.bugfix.patch.md
      description: "Surgically update spec, plan, and tasks to address the reported bug"
    - name: speckit.bugfix.verify
      file: commands/speckit.bugfix.verify.md
      description: "Verify that bugfix patches are consistent across all spec artifacts"

hooks:
  after_implement:
    command: speckit.bugfix.verify
    optional: true
    prompt: "Run bugfix consistency check after implementation?"
    description: "Verify spec artifact consistency after implementation completes"

tags:
  - "bugfix"
  - "debugging"
  - "workflow"
  - "traceability"
  - "maintenance"
