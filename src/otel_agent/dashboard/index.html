<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>otel-agent Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .status { font-size: 13px; color: #8b949e; }
.controls { padding: 16px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.controls input, .controls select { background: #161b22; border: 1px solid #30363d; color: #e1e4e8; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
.controls input { min-width: 250px; }
.controls select { min-width: 120px; }
.controls .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.controls .btn:hover { background: #2ea043; }
.controls .btn.secondary { background: #21262d; border: 1px solid #30363d; }
.controls .btn.secondary:hover { background: #30363d; }
.table-wrap { padding: 0 24px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #161b22; text-align: left; padding: 10px 12px; border-bottom: 2px solid #30363d; font-weight: 600; color: #8b949e; font-size: 12px; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
tr:hover { background: #161b22; cursor: pointer; }
.status-2xx { color: #3fb950; }
.status-4xx { color: #d29922; }
.status-5xx { color: #f85149; }
.method { font-weight: 600; font-size: 12px; padding: 2px 6px; border-radius: 4px; }
.method-GET { background: #1f3a2e; color: #3fb950; }
.method-POST { background: #2a1f3a; color: #a371f7; }
.method-PUT { background: #3a2a1f; color: #d29922; }
.method-DELETE { background: #3a1f1f; color: #f85149; }
.empty { text-align: center; padding: 60px; color: #8b949e; }
.detail-overlay { display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 50%; background: #161b22; border-left: 1px solid #30363d; overflow-y: auto; z-index: 100; }
.detail-overlay.active { display: block; }
.detail-header { padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
.detail-header h2 { font-size: 16px; }
.detail-header .close { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 20px; }
.detail-body { padding: 16px 24px; }
.detail-section { margin-bottom: 20px; }
.detail-section h3 { font-size: 13px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; }

/* Request/Response Section Styling */
.detail-section-request {
  border-left: 3px solid #58a6ff;
  background: rgba(88, 166, 255, 0.05);
  padding-left: 12px;
}
.detail-section-request h3::before {
  content: "\1F4E4  ";
  margin-right: 4px;
}
.detail-section-response {
  border-left: 3px solid #3fb950;
  background: rgba(63, 185, 80, 0.05);
  padding-left: 12px;
}
.detail-section-response h3::before {
  content: "\1F4E5  ";
  margin-right: 4px;
}
.detail-section pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
.detail-section .copy-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 8px; }
.detail-section .copy-btn:hover { background: #30363d; color: #e1e4e8; }
.pagination { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.pagination .info { color: #8b949e; font-size: 13px; }
.pagination .pages { display: flex; gap: 8px; }
.pagination .pages button { background: #21262d; border: 1px solid #30363d; color: #e1e4e8; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
.pagination .pages button.active { background: #238636; border-color: #238636; }
.pagination .pages button:disabled { opacity: 0.5; cursor: not-allowed; }
.chart-wrap { padding: 16px 24px; }
.chart-wrap canvas { max-height: 200px; }

/* JSON Viewer — Syntax Highlighting */
.json-key { color: #79c0ff; }
.json-string { color: #a5d6ff; }
.json-number { color: #d2a8ff; }
.json-boolean { color: #58a6ff; }
.json-null { color: #8b949e; font-style: italic; }

/* Body Viewer States */
.body-empty { color: #8b949e; font-style: italic; }
.body-raw pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; max-height: 600px; overflow-y: auto; }

/* Usage Summary Bar */
.usage-summary { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; font-size: 12px; color: #8b949e; display: flex; gap: 16px; align-items: center; }
.usage-summary .usage-item { display: flex; gap: 4px; }
.usage-summary .usage-value { color: #e1e4e8; font-weight: 600; }

/* LLM Body Viewer — Chat Messages */
.chat-message { margin-bottom: 12px; border-radius: 8px; padding: 10px 14px; }
.chat-system { background: #1c2128; border: 1px solid #30363d; }
.chat-user { background: #1a2332; border-left: 3px solid #58a6ff; }
.chat-assistant { background: #1a2a1f; border-left: 3px solid #3fb950; }
.chat-role { display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; padding: 1px 6px; border-radius: 3px; }
.chat-system .chat-role { background: #30363d; color: #8b949e; }
.chat-user .chat-role { background: #1f3a5c; color: #58a6ff; }
.chat-assistant .chat-role { background: #1f3a2e; color: #3fb950; }
.chat-content { font-size: 13px; line-height: 1.6; max-height: 500px; overflow-y: auto; }
.chat-content p { margin-bottom: 8px; }
.chat-content p:last-child { margin-bottom: 0; }
.chat-content pre { background: #0d1117; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; margin: 8px 0; }
.chat-content code { background: #21262d; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; }
.chat-content pre code { background: none; padding: 0; }
.chat-content ul, .chat-content ol { padding-left: 20px; margin: 8px 0; }
.chat-content li { margin-bottom: 4px; }
.chat-content blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; margin: 8px 0; }
.chat-content h1, .chat-content h2, .chat-content h3 { margin: 12px 0 6px; }
.chat-content h1 { font-size: 16px; }
.chat-content h2 { font-size: 14px; }
.chat-content h3 { font-size: 13px; }

/* Response Metadata */
.response-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.response-meta-badge { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 3px 8px; font-size: 12px; color: #e1e4e8; }
.response-meta-badge.model { border-color: #58a6ff; color: #58a6ff; }
.response-meta-badge.finish { border-color: #3fb950; color: #3fb950; }

/* Body Viewer Toggle */
.body-viewer { position: relative; }
.body-toggle-bar { display: flex; gap: 4px; margin-bottom: 8px; }
.body-toggle-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.body-toggle-btn.active { background: #30363d; color: #e1e4e8; }

/* Anthropic Content Block Placeholders */
.content-placeholder { color: #8b949e; font-style: italic; font-size: 12px; padding: 4px 8px; background: #1c2128; border-radius: 4px; display: inline-block; }

/* Truncation & Incomplete Indicators */
.body-truncated { background: #2d1f0e; border: 1px solid #d29922; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; font-size: 13px; color: #d29922; }
.body-truncated::before { content: "\26A0  "; }
.streaming-incomplete { background: #0d1a2e; border: 1px solid #388bfd; border-radius: 6px; padding: 6px 10px; margin-top: 8px; font-size: 12px; color: #58a6ff; font-style: italic; }
.chat-tool { background: #2d2a1e; border-left: 3px solid #d29922; }
.chat-tool .chat-role { background: #3d3520; color: #d29922; }
.tool-content-raw { background: #0d1117; padding: 10px; border-radius: 6px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; color: #e1e4e8; }
.tool-content-toggle { color: #58a6ff; cursor: pointer; font-size: 12px; margin-top: 4px; display: inline-block; }
.tool-content-toggle:hover { text-decoration: underline; }
.tool-call { background: #1c2128; border: 1px solid #30363d; border-radius: 4px; padding: 6px 10px; margin: 4px 0; font-size: 12px; }
.tool-call-name { color: #d2a8ff; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; }
.tool-call-args { color: #8b949e; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; margin-top: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
</style>
</head>
<body>
<div class="header">
  <h1>otel-agent Dashboard</h1>
  <div class="status" id="status">Loading...</div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search URL or upstream...">
  <select id="method-filter">
    <option value="">All Methods</option>
    <option value="GET">GET</option>
    <option value="POST">POST</option>
    <option value="PUT">PUT</option>
    <option value="DELETE">DELETE</option>
  </select>
  <select id="status-filter">
    <option value="0">All Status</option>
    <option value="200">200</option>
    <option value="400">400</option>
    <option value="404">404</option>
    <option value="500">500</option>
  </select>
  <button class="btn secondary" onclick="exportData('csv')">Export CSV</button>
  <button class="btn secondary" onclick="exportData('json')">Export JSON</button>
</div>

<div class="chart-wrap">
  <canvas id="latency-chart"></canvas>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Timestamp</th>
        <th>Method</th>
        <th>URL</th>
        <th>Status</th>
        <th>Latency</th>
      </tr>
    </thead>
    <tbody id="requests-body">
    </tbody>
  </table>
  <div class="empty" id="empty-state" style="display:none;">No requests logged yet.</div>
</div>

<div class="pagination">
  <div class="info" id="pagination-info"></div>
  <div class="pages" id="pagination-pages"></div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <div class="detail-header">
    <h2>Request Details</h2>
    <button class="close" onclick="closeDetail()">&times;</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<script>
const MAX_BODY_LENGTH = 500000;
const MAX_TOOL_CONTENT_LENGTH = 2000;
let currentCursor = 0;
let cursorStack = [];
let chart = null;
let chartData = [];

const searchInput = document.getElementById('search');
const methodFilter = document.getElementById('method-filter');
const statusFilter = document.getElementById('status-filter');

let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => { currentCursor = 0; cursorStack = []; loadRequests(); }, 300);
});
methodFilter.addEventListener('change', () => { currentCursor = 0; cursorStack = []; loadRequests(); });
statusFilter.addEventListener('change', () => { currentCursor = 0; cursorStack = []; loadRequests(); });

function getParams() {
  const p = new URLSearchParams();
  if (searchInput.value) p.set('search', searchInput.value);
  if (methodFilter.value) p.set('method', methodFilter.value);
  if (statusFilter.value !== '0') p.set('status', statusFilter.value);
  if (currentCursor > 0) p.set('cursor', currentCursor);
  p.set('limit', 50);
  return p.toString();
}

async function loadRequests() {
  try {
    const resp = await fetch('/api/requests?' + getParams());
    const data = await resp.json();
    renderTable(data.data);
    renderPagination(data);
    document.getElementById('status').textContent = data.total + ' requests';
  } catch (e) {
    document.getElementById('status').textContent = 'Error loading';
  }
}

function renderTable(requests) {
  const tbody = document.getElementById('requests-body');
  const empty = document.getElementById('empty-state');
  if (!requests.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = requests.map(r => `
    <tr onclick="showDetail(${r.id})">
      <td>${r.id}</td>
      <td>${new Date(r.timestamp).toLocaleString()}</td>
      <td><span class="method method-${r.method}">${r.method}</span></td>
      <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.url}</td>
      <td><span class="status-${Math.floor(r.response_status/100)}xx">${r.response_status}</span></td>
      <td>${r.latency_ms?.toFixed(0) || 0}ms</td>
    </tr>
  `).join('');
}

function renderPagination(data) {
  const { total, has_more, next_cursor } = data;
  document.getElementById('pagination-info').textContent = total ? `${total} total requests` : 'No results';
  const pages = document.getElementById('pagination-pages');
  let html = '';
  html += `<button ${cursorStack.length === 0 ? 'disabled' : ''} onclick="goPrev()">Prev</button>`;
  html += `<button ${!has_more ? 'disabled' : ''} onclick="goNext(${next_cursor})">Next</button>`;
  pages.innerHTML = html;
}

function goNext(nextCursor) {
  cursorStack.push(currentCursor);
  currentCursor = nextCursor;
  loadRequests();
}

function goPrev() {
  if (cursorStack.length > 0) {
    currentCursor = cursorStack.pop();
    loadRequests();
  }
}

async function showDetail(id) {
  const resp = await fetch('/api/requests/' + id);
  const r = await resp.json();
  const body = document.getElementById('detail-body');

  let reqParsed = null, respParsed = null;
  try { reqParsed = JSON.parse(r.request_body); } catch(e) {}
  try { respParsed = JSON.parse(r.response_body); } catch(e) {}

  let usageBar = '';
  if (respParsed && respParsed.usage) {
    usageBar = '<div class="usage-summary">' + renderUsageSummary(respParsed.usage) + '</div>';
  }
  // Streaming preview may have usage in the last chunk
  if (!usageBar && respParsed && respParsed.streamed && respParsed.preview) {
    const chunks = parseStreamingChunks(respParsed.preview);
    for (let i = chunks.length - 1; i >= 0; i--) {
      if (chunks[i].usage) { usageBar = '<div class="usage-summary">' + renderUsageSummary(chunks[i].usage) + '</div>'; break; }
    }
  }

  body.innerHTML = `
    <div class="detail-section">
      <h3>General</h3>
      <pre>${r.method} ${r.url}\nStatus: ${r.response_status} | Latency: ${r.latency_ms?.toFixed(0)}ms</pre>
      <button class="copy-btn" onclick="copyCurl(${JSON.stringify(JSON.stringify(r)).replace(/"/g, '&quot;')})">Copy as curl</button>
    </div>
    <div class="detail-section detail-section-request">
      <h3>Request Headers</h3>
      <pre>${formatHeaders(r.request_headers)}</pre>
    </div>
    <div class="detail-section detail-section-request">
      <h3>Request Body</h3>
      ${formatBody(r.request_body, 'request')}
    </div>
    <div class="detail-section detail-section-response">
      <h3>Response Headers</h3>
      <pre>${formatHeaders(r.response_headers)}</pre>
    </div>
    <div class="detail-section detail-section-response">
      <h3>Response Body</h3>
      ${usageBar}${formatBody(r.response_body, 'response')}
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('active');
}

function formatHeaders(h) {
  if (!h) return '(none)';
  if (typeof h === 'string') { try { h = JSON.parse(h); } catch(e) { return h; } }
  return Object.entries(h).map(([k,v]) => `${k}: ${v}`).join('\n');
}

/* ========== JSON Viewer Utilities ========== */

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function isTruncated(body, maxLen) {
  if (!body) return { truncated: false };
  if (body.length < maxLen) return { truncated: false };
  try { JSON.parse(body); return { truncated: false }; } catch(e) {}
  return { truncated: true, reason: 'Body truncated (original exceeded ' + Math.round(maxLen/1000) + 'KB)' };
}

function extractPartialMessages(body) {
  const messages = [];
  let depth = 0, start = -1;
  for (let i = 0; i < body.length; i++) {
    if (body[i] === '{') { if (depth === 0) start = i; depth++; }
    else if (body[i] === '}') {
      depth--;
      if (depth === 0 && start >= 0) {
        try {
          const obj = JSON.parse(body.slice(start, i + 1));
          if (obj && typeof obj === 'object' && obj.role) {
            const role = obj.role;
            let content = obj.content || '';
            // Handle assistant messages with tool_calls
            if (role === 'assistant' && obj.tool_calls && obj.tool_calls.length > 0) {
              const tcText = obj.tool_calls.map(tc => {
                const fn = tc.function || {};
                return '[' + (fn.name || 'tool') + '] ' + (fn.arguments || '');
              }).join(', ');
              content = content ? content + ' | ' + tcText : tcText;
            }
            messages.push({ role, content: String(content) });
          }
        } catch(e) {}
        start = -1;
      }
    }
  }
  return messages;
}

function highlightJsonString(value, indent) {
  const pad = '  '.repeat(indent);
  if (value === null) return `${pad}<span class="json-null">null</span>`;
  if (typeof value === 'boolean') return `${pad}<span class="json-boolean">${value}</span>`;
  if (typeof value === 'number') return `${pad}<span class="json-number">${value}</span>`;
  if (typeof value === 'string') return `${pad}<span class="json-string">"${escapeHtml(value)}"</span>`;

  if (Array.isArray(value)) {
    if (value.length === 0) return `${pad}[]`;
    const items = value.map(v => highlightJsonString(v, indent + 1));
    return `${pad}[\n${items.join(',\n')}\n${pad}]`;
  }

  if (typeof value === 'object') {
    const keys = Object.keys(value);
    if (keys.length === 0) return `${pad}{}`;
    const entries = keys.map(k =>
      `${pad}  <span class="json-key">"${escapeHtml(k)}"</span>: ${highlightJsonString(value[k], indent + 1).trim()}`
    );
    return `${pad}{\n${entries.join(',\n')}\n${pad}}`;
  }
  return pad + String(value);
}

function renderUsageSummary(usage) {
  if (!usage) return '';
  const parts = [];
  const input = usage.input_tokens ?? usage.prompt_tokens;
  const output = usage.output_tokens ?? usage.completion_tokens;
  const total = usage.total_tokens;
  if (input !== undefined) parts.push(`<span class="usage-item"><span class="usage-value">${input}</span> prompt</span>`);
  if (output !== undefined) parts.push(`<span class="usage-item"><span class="usage-value">${output}</span> completion</span>`);
  if (total !== undefined) parts.push(`<span class="usage-item"><span class="usage-value">${total}</span> total</span>`);
  if (parts.length === 0) return '';
  return 'Tokens: ' + parts.join(' / ');
}

/* ========== LLM Format Detection ========== */

function detectFormat(parsed) {
  if (!parsed || typeof parsed !== 'object') return null;
  // Streaming preview: {"streamed": true, "preview": "...concatenated chunks..."}
  if (parsed.streamed && parsed.preview) return 'streaming-preview';
  if (parsed.choices && Array.isArray(parsed.choices)) return 'openai-response';
  if (parsed.content && Array.isArray(parsed.content) && parsed.type === 'message') return 'anthropic-response';
  if (parsed.messages && Array.isArray(parsed.messages) && parsed.model && parsed.max_tokens === undefined) return 'openai-request';
  if (parsed.messages && Array.isArray(parsed.messages) && parsed.max_tokens !== undefined) return 'anthropic-request';
  return null;
}

/* ========== Streaming Preview Parsing ========== */

function parseStreamingChunks(previewStr) {
  // Split concatenated JSON objects: {"choices":[...]}{"choices":[...]}
  const chunks = [];
  let depth = 0, start = -1;
  for (let i = 0; i < previewStr.length; i++) {
    if (previewStr[i] === '{') { if (depth === 0) start = i; depth++; }
    else if (previewStr[i] === '}') { depth--; if (depth === 0 && start >= 0) { try { chunks.push(JSON.parse(previewStr.slice(start, i + 1))); } catch(e) {} start = -1; } }
  }
  // Handle incomplete trailing chunk (depth > 0 at end of string)
  if (depth > 0 && start >= 0) {
    const tail = previewStr.slice(start);
    // Try to parse as-is first (might be valid despite missing braces)
    try { chunks.push(JSON.parse(tail)); } catch(e) {
      // Try closing missing braces progressively
      for (let close = 1; close <= depth; close++) {
        try { chunks.push(JSON.parse(tail + '}'.repeat(close))); break; } catch(e2) {}
      }
    }
  }
  return chunks;
}

function extractStreamingContent(parsed) {
  if (!parsed || !parsed.preview) return null;
  const chunks = parseStreamingChunks(parsed.preview);
  if (!chunks.length) return null;
  // Reassemble content from delta chunks
  let content = '';
  let reasoningContent = '';
  let model = '';
  let finishReason = '';
  for (const chunk of chunks) {
    if (chunk.model) model = chunk.model;
    const choice = chunk.choices && chunk.choices[0];
    if (!choice) continue;
    if (choice.finish_reason) finishReason = choice.finish_reason;
    const delta = choice.delta || {};
    if (delta.content) content += delta.content;
    if (delta.reasoning_content) reasoningContent += delta.reasoning_content;
  }
  const incomplete = !content && !reasoningContent;
  // Show reasoning content as a note if present
  let fullContent = content;
  if (reasoningContent) fullContent = content + '\n\n---\n**Reasoning:** ' + reasoningContent;
  return { content: fullContent, model, finishReason: finishReason || 'streaming', incomplete };
}

/* ========== Markdown Rendering ========== */

function renderMarkdown(text) {
  if (!text) return '';
  if (typeof text !== 'string') text = String(text);
  try {
    const html = marked.parse(text);
    return DOMPurify.sanitize(html);
  } catch(e) {
    return '<pre>' + escapeHtml(text) + '</pre>';
  }
}

/* ========== LLM Content Extraction ========== */

function extractOpenAiRequestContent(parsed) {
  if (!parsed || !parsed.messages) return null;
  return parsed.messages.map(m => {
    const role = m.role || 'unknown';
    // Assistant messages with tool_calls: render tool calls as content
    if (role === 'assistant' && m.tool_calls && m.tool_calls.length > 0) {
      let content = m.content || '';
      const tcHtml = m.tool_calls.map(tc => {
        const fn = tc.function || {};
        const name = fn.name || 'unknown';
        let args = fn.arguments || '';
        try { args = JSON.stringify(JSON.parse(args), null, 2); } catch(e) {}
        return '<div class="tool-call"><span class="tool-call-name">' + escapeHtml(name) + '</span><div class="tool-call-args">' + escapeHtml(args) + '</div></div>';
      }).join('');
      if (content) content = renderMarkdown(content);
      return { role, content: content ? '<div>' + content + '</div>' + tcHtml : tcHtml };
    }
    // Tool messages: render content
    if (role === 'tool') {
      let content = m.content || '';
      try { content = JSON.stringify(JSON.parse(content), null, 2); } catch(e) {}
      return { role, content: content };
    }
    return { role, content: m.content || '' };
  });
}

function extractOpenAiResponseContent(parsed) {
  if (!parsed || !parsed.choices || !parsed.choices.length) return null;
  const choice = parsed.choices[0];
  const msg = choice.message || choice.delta || {};
  return { content: msg.content || '', model: parsed.model || '', finishReason: choice.finish_reason || '' };
}

function extractAnthropicRequestContent(parsed) {
  if (!parsed || !parsed.messages) return null;
  const messages = [];
  if (parsed.system) {
    const sysContent = typeof parsed.system === 'string' ? parsed.system :
      (Array.isArray(parsed.system) ? parsed.system.filter(b => b.type === 'text').map(b => b.text).join('\n') : '');
    if (sysContent) messages.push({ role: 'system', content: sysContent });
  }
  parsed.messages.forEach(m => {
    let content = '';
    if (typeof m.content === 'string') {
      content = m.content;
    } else if (Array.isArray(m.content)) {
      content = m.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
    }
    messages.push({ role: m.role || 'unknown', content });
  });
  return messages;
}

function extractAnthropicResponseContent(parsed) {
  if (!parsed || !parsed.content) return null;
  const textBlocks = parsed.content.filter(b => b.type === 'text');
  const content = textBlocks.map(b => b.text).join('\n\n');
  return { content, model: parsed.model || '', stopReason: parsed.stop_reason || '' };
}

/* ========== LLM Chat Rendering ========== */

function renderChatMessage(role, content) {
  const roleClass = 'chat-' + (role || 'unknown');
  // Tool messages: render as formatted JSON or monospace preformatted text
  if (role === 'tool') {
    const uid = 'tc-' + Math.random().toString(36).slice(2, 8);
    const isLong = content.length > MAX_TOOL_CONTENT_LENGTH;
    const truncated = isLong ? content.slice(0, MAX_TOOL_CONTENT_LENGTH) : content;
    let parsed = null;
    try { parsed = JSON.parse(truncated); } catch(e) {}
    if (parsed) {
      const jsonHtml = highlightJsonString(parsed, 0);
      const fullHtml = isLong ? jsonHtml + '<div class="tool-content-toggle" onclick="toggleToolContent(this)">Show more</div>' : jsonHtml;
      return `<div class="chat-message ${roleClass}"><span class="chat-role">tool</span><div class="chat-content"><pre id="${uid}">${fullHtml}</pre>${isLong ? '<template data-full="' + uid + '">' + escapeHtml(content) + '</template>' : ''}</div></div>`;
    }
    // Non-JSON: render as monospace preformatted text
    const textHtml = escapeHtml(truncated);
    const fullText = isLong ? textHtml + '<div class="tool-content-toggle" onclick="toggleToolContent(this)">Show more</div>' : textHtml;
    return `<div class="chat-message ${roleClass}"><span class="chat-role">tool</span><div class="chat-content"><div class="tool-content-raw" id="${uid}">${fullText}</div>${isLong ? '<template data-full="' + uid + '">' + escapeHtml(content) + '</template>' : ''}</div></div>`;
  }
  // Assistant messages with tool_calls: content may contain HTML from extractOpenAiRequestContent
  const isHtmlContent = content && (content.startsWith('<div class="tool-call">') || content.includes('tool-call'));
  let renderedContent;
  if (isHtmlContent) {
    renderedContent = content;
  } else {
    renderedContent = renderMarkdown(content);
  }
  return `<div class="chat-message ${roleClass}"><span class="chat-role">${escapeHtml(role)}</span><div class="chat-content">${renderedContent}</div></div>`;
}

function toggleToolContent(el) {
  const pre = el.parentElement.querySelector('pre, .tool-content-raw');
  const tpl = el.parentElement.querySelector('template');
  if (!pre || !tpl) return;
  const fullContent = tpl.getAttribute('data-full');
  const uid = pre.id;
  const isExpanded = el.textContent === 'Show less';
  if (isExpanded) {
    // Collapse: re-render truncated
    let parsed = null;
    try { parsed = JSON.parse(fullContent); } catch(e) {}
    if (parsed) {
      pre.innerHTML = highlightJsonString(parsed, 0);
    } else {
      pre.innerHTML = escapeHtml(fullContent.slice(0, MAX_TOOL_CONTENT_LENGTH));
    }
    el.textContent = 'Show more';
  } else {
    // Expand: show full content
    let parsed = null;
    try { parsed = JSON.parse(fullContent); } catch(e) {}
    if (parsed) {
      pre.innerHTML = highlightJsonString(parsed, 0) + '<div class="tool-content-toggle" onclick="toggleToolContent(this)">Show less</div>';
    } else {
      pre.innerHTML = escapeHtml(fullContent) + '<div class="tool-content-toggle" onclick="toggleToolContent(this)">Show less</div>';
    }
    el.textContent = '';
  }
}

function renderLlmRequestBody(parsed) {
  const format = detectFormat(parsed);
  let messages = null;
  if (format === 'openai-request') messages = extractOpenAiRequestContent(parsed);
  else if (format === 'anthropic-request') messages = extractAnthropicRequestContent(parsed);
  if (!messages || !messages.length) return null;
  return messages.map(m => renderChatMessage(m.role, m.content)).join('');
}

function renderLlmResponseBody(parsed, rawBody) {
  const format = detectFormat(parsed);
  let data = null;
  if (format === 'streaming-preview') data = extractStreamingContent(parsed);
  else if (format === 'openai-response') data = extractOpenAiResponseContent(parsed);
  else if (format === 'anthropic-response') data = extractAnthropicResponseContent(parsed);
  if (!data) return null;

  let metaHtml = '<div class="response-meta">';
  if (data.model) metaHtml += `<span class="response-meta-badge model">${escapeHtml(data.model)}</span>`;
  const finishReason = data.finishReason || data.stopReason;
  if (finishReason) metaHtml += `<span class="response-meta-badge finish">${escapeHtml(finishReason)}</span>`;
  metaHtml += '</div>';

  const contentHtml = renderMarkdown(data.content);
  const incompleteNote = data.incomplete
    ? '<div class="streaming-incomplete">Streaming preview may be incomplete \u2014 limited chunks captured</div>'
    : '';
  return `${metaHtml}<div class="chat-message chat-assistant"><div class="chat-content">${contentHtml}</div></div>${incompleteNote}`;
}

/* ========== Body Viewer with Toggle ========== */

function formatBody(b, context) {
  if (!b) return '<div class="body-empty">(empty)</div>';

  let parsed = null;
  let isValidJson = false;
  try {
    parsed = JSON.parse(b);
    isValidJson = true;
  } catch(e) {}

  if (!isValidJson) {
    const t = isTruncated(b, MAX_BODY_LENGTH);
    const notice = t.truncated
      ? `<div class="body-truncated">${escapeHtml(t.reason)}</div>`
      : '<div style="color:#8b949e;font-size:12px;margin-top:4px;">Content is not valid JSON</div>';
    // FR-004: Attempt to render partial LLM messages from truncated JSON
    if (t.truncated && context === 'request') {
      const partialMessages = extractPartialMessages(b);
      if (partialMessages.length > 0) {
        const chatHtml = partialMessages.map(m => renderChatMessage(m.role, m.content)).join('');
        return `<div class="body-truncated">${escapeHtml(t.reason)}</div><div class="body-llm-view">${chatHtml}</div><div class="body-raw" style="margin-top:8px;"><pre>${escapeHtml(b)}</pre></div>`;
      }
    }
    return `<div class="body-raw">${notice}<pre>${escapeHtml(b)}</pre></div>`;
  }

  const format = detectFormat(parsed);
  if (format) {
    const isRequest = format.endsWith('-request');
    const llmHtml = isRequest ? renderLlmRequestBody(parsed) : renderLlmResponseBody(parsed, b);
    if (llmHtml) {
      const bodyId = 'body-' + Math.random().toString(36).slice(2, 8);
      const rawHtml = `<pre>${highlightJsonString(parsed, 0)}</pre>`;
      return `
        <div class="body-viewer" id="${bodyId}">
          <div class="body-toggle-bar">
            <button class="body-toggle-btn active" data-view="llm" data-body-id="${bodyId}">Formatted</button>
            <button class="body-toggle-btn" data-view="raw" data-body-id="${bodyId}">Raw</button>
          </div>
          <div class="body-llm-view" data-body-id="${bodyId}">${llmHtml}</div>
          <div class="body-raw-view" data-body-id="${bodyId}" style="display:none">${rawHtml}</div>
        </div>`;
    }
  }

  return `<div class="body-raw"><pre>${highlightJsonString(parsed, 0)}</pre></div>`;
}

/* ========== Event Delegation ========== */

document.getElementById('detail-body').addEventListener('click', function(e) {
  const viewToggle = e.target.closest('.body-toggle-btn');
  if (viewToggle) {
    const bodyId = viewToggle.getAttribute('data-body-id');
    const viewer = document.getElementById(bodyId);
    if (!viewer) return;
    const view = viewToggle.getAttribute('data-view');
    viewer.querySelectorAll('.body-toggle-btn').forEach(btn => btn.classList.remove('active'));
    viewToggle.classList.add('active');
    const llmContainer = viewer.querySelector('.body-llm-view');
    const rawContainer = viewer.querySelector('.body-raw-view');
    if (view === 'llm') {
      llmContainer.style.display = '';
      rawContainer.style.display = 'none';
    } else {
      llmContainer.style.display = 'none';
      rawContainer.style.display = '';
    }
  }
});

/* ========== Existing Functions ========== */

function copyCurl(rJson) {
  const r = JSON.parse(rJson);
  let curl = `curl -X ${r.method} '${r.url}'`;
  const headers = typeof r.request_headers === 'string' ? JSON.parse(r.request_headers) : r.request_headers;
  if (headers) {
    for (const [k, v] of Object.entries(headers)) {
      if (k.toLowerCase() !== 'host') curl += ` \\\n  -H '${k}: ${v}'`;
    }
  }
  if (r.request_body) curl += ` \\\n  -d '${r.request_body}'`;
  navigator.clipboard.writeText(curl);
}

function exportData(format) {
  const params = getParams().replace(/page=\d+&?/, '').replace(/per_page=\d+&?/, '');
  window.location.href = '/api/export?format=' + format + '&' + params;
}

function initChart() {
  const ctx = document.getElementById('latency-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Latency (ms)', data: [], borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.1)', fill: true, tension: 0.3 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } } } }
  });
}

function addToChart(req) {
  if (!chart) return;
  const label = req.method + ' ' + (req.url?.split('?')[0] || '');
  chart.data.labels.push(label);
  chart.data.datasets[0].data.push(req.latency_ms || 0);
  if (chart.data.labels.length > 50) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update();
}

function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = (e) => {
    try {
      const req = JSON.parse(e.data);
      addToChart(req);
      if (currentCursor === 0 && !searchInput.value && !methodFilter.value && statusFilter.value === '0') {
        prependRow(req);
      }
    } catch (err) {}
  };
  es.onerror = () => { setTimeout(connectSSE, 5000); };
}

function prependRow(r) {
  const tbody = document.getElementById('requests-body');
  const empty = document.getElementById('empty-state');
  empty.style.display = 'none';
  const row = document.createElement('tr');
  row.onclick = () => showDetail(r.id);
  row.innerHTML = `
    <td>${r.id}</td>
    <td>${new Date(r.timestamp).toLocaleString()}</td>
    <td><span class="method method-${r.method}">${r.method}</span></td>
    <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.url}</td>
    <td><span class="status-${Math.floor(r.response_status/100)}xx">${r.response_status}</span></td>
    <td>${r.latency_ms?.toFixed(0) || 0}ms</td>
  `;
  tbody.insertBefore(row, tbody.firstChild);
  while (tbody.children.length > 50) {
    tbody.removeChild(tbody.lastChild);
  }
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });
initChart();
loadRequests();
connectSSE();
</script>
