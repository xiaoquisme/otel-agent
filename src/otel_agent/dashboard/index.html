<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>otel-agent Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .status { font-size: 13px; color: #8b949e; }
.controls { padding: 16px 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.controls input, .controls select { background: #161b22; border: 1px solid #30363d; color: #e1e4e8; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
.controls input { min-width: 250px; }
.controls select { min-width: 120px; }
.controls .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.controls .btn:hover { background: #2ea043; }
.controls .btn.secondary { background: #21262d; border: 1px solid #30363d; }
.controls .btn.secondary:hover { background: #30363d; }
.table-wrap { padding: 0 24px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #161b22; text-align: left; padding: 10px 12px; border-bottom: 2px solid #30363d; font-weight: 600; color: #8b949e; font-size: 12px; text-transform: uppercase; }
td { padding: 10px 12px; border-bottom: 1px solid #21262d; }
tr:hover { background: #161b22; cursor: pointer; }
.status-2xx { color: #3fb950; }
.status-4xx { color: #d29922; }
.status-5xx { color: #f85149; }
.method { font-weight: 600; font-size: 12px; padding: 2px 6px; border-radius: 4px; }
.method-GET { background: #1f3a2e; color: #3fb950; }
.method-POST { background: #2a1f3a; color: #a371f7; }
.method-PUT { background: #3a2a1f; color: #d29922; }
.method-DELETE { background: #3a1f1f; color: #f85149; }
.empty { text-align: center; padding: 60px; color: #8b949e; }
.detail-overlay { display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 50%; background: #161b22; border-left: 1px solid #30363d; overflow-y: auto; z-index: 100; }
.detail-overlay.active { display: block; }
.detail-header { padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
.detail-header h2 { font-size: 16px; }
.detail-header .close { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 20px; }
.detail-body { padding: 16px 24px; }
.detail-section { margin-bottom: 20px; }
.detail-section h3 { font-size: 13px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; }
.detail-section pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
.detail-section .copy-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 8px; }
.detail-section .copy-btn:hover { background: #30363d; color: #e1e4e8; }
.pagination { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.pagination .info { color: #8b949e; font-size: 13px; }
.pagination .pages { display: flex; gap: 8px; }
.pagination .pages button { background: #21262d; border: 1px solid #30363d; color: #e1e4e8; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
.pagination .pages button.active { background: #238636; border-color: #238636; }
.pagination .pages button:disabled { opacity: 0.5; cursor: not-allowed; }
.chart-wrap { padding: 16px 24px; }
.chart-wrap canvas { max-height: 200px; }

/* JSON Viewer — Syntax Highlighting (T001) */
.json-key { color: #79c0ff; }
.json-string { color: #a5d6ff; }
.json-number { color: #d2a8ff; }
.json-boolean { color: #58a6ff; }
.json-null { color: #8b949e; font-style: italic; }
.json-toggle { color: #8b949e; cursor: pointer; user-select: none; display: inline-block; width: 1.2em; text-align: center; }
.json-toggle:hover { color: #e1e4e8; }
.json-badge { background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 1px 6px; font-size: 11px; color: #8b949e; margin-left: 6px; white-space: nowrap; }
.json-children { padding-left: 20px; border-left: 1px solid #21262d; }
.json-summary { color: #8b949e; font-size: 12px; }
.json-node { line-height: 1.6; white-space: nowrap; }

/* Body Viewer Toolbar (T001) */
.body-viewer-toolbar { display: flex; gap: 4px; margin-bottom: 8px; }
.body-toggle { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.body-toggle.active { background: #30363d; color: #e1e4e8; }

/* Body Viewer States (T001) */
.body-empty { color: #8b949e; font-style: italic; }
.body-raw pre { background: #0d1117; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }

/* JSON Badge Variants (T002) */
.json-badge-model { border-color: #58a6ff; }
.json-badge-messages { border-color: #a371f7; }
.json-badge-stream { border-color: #3fb950; }
.json-badge-usage { border-color: #d29922; }
.json-badge-tool { border-color: #f0883e; }
.json-badge-system { border-color: #8b949e; }

/* Usage Summary Bar */
.usage-summary { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; font-size: 12px; color: #8b949e; display: flex; gap: 16px; align-items: center; }
.usage-summary .usage-item { display: flex; gap: 4px; }
.usage-summary .usage-value { color: #e1e4e8; font-weight: 600; }
</style>
</head>
<body>
<div class="header">
  <h1>otel-agent Dashboard</h1>
  <div class="status" id="status">Loading...</div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search URL or upstream...">
  <select id="method-filter">
    <option value="">All Methods</option>
    <option value="GET">GET</option>
    <option value="POST">POST</option>
    <option value="PUT">PUT</option>
    <option value="DELETE">DELETE</option>
  </select>
  <select id="status-filter">
    <option value="0">All Status</option>
    <option value="200">200</option>
    <option value="400">400</option>
    <option value="404">404</option>
    <option value="500">500</option>
  </select>
  <button class="btn secondary" onclick="exportData('csv')">Export CSV</button>
  <button class="btn secondary" onclick="exportData('json')">Export JSON</button>
</div>

<div class="chart-wrap">
  <canvas id="latency-chart"></canvas>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Timestamp</th>
        <th>Method</th>
        <th>URL</th>
        <th>Status</th>
        <th>Latency</th>
      </tr>
    </thead>
    <tbody id="requests-body">
    </tbody>
  </table>
  <div class="empty" id="empty-state" style="display:none;">No requests logged yet.</div>
</div>

<div class="pagination">
  <div class="info" id="pagination-info"></div>
  <div class="pages" id="pagination-pages"></div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <div class="detail-header">
    <h2>Request Details</h2>
    <button class="close" onclick="closeDetail()">&times;</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
let currentCursor = 0;
let cursorStack = [];  // Stack of previous cursors for "Prev" navigation
let chart = null;
let chartData = [];

const searchInput = document.getElementById('search');
const methodFilter = document.getElementById('method-filter');
const statusFilter = document.getElementById('status-filter');

let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => { currentCursor = 0; cursorStack = []; loadRequests(); }, 300);
});
methodFilter.addEventListener('change', () => { currentCursor = 0; cursorStack = []; loadRequests(); });
statusFilter.addEventListener('change', () => { currentCursor = 0; cursorStack = []; loadRequests(); });

function getParams() {
  const p = new URLSearchParams();
  if (searchInput.value) p.set('search', searchInput.value);
  if (methodFilter.value) p.set('method', methodFilter.value);
  if (statusFilter.value !== '0') p.set('status', statusFilter.value);
  if (currentCursor > 0) p.set('cursor', currentCursor);
  p.set('limit', 50);
  return p.toString();
}

async function loadRequests() {
  try {
    const resp = await fetch('/api/requests?' + getParams());
    const data = await resp.json();
    renderTable(data.data);
    renderPagination(data);
    document.getElementById('status').textContent = data.total + ' requests';
  } catch (e) {
    document.getElementById('status').textContent = 'Error loading';
  }
}

function renderTable(requests) {
  const tbody = document.getElementById('requests-body');
  const empty = document.getElementById('empty-state');
  if (!requests.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = requests.map(r => `
    <tr onclick="showDetail(${r.id})">
      <td>${r.id}</td>
      <td>${new Date(r.timestamp).toLocaleString()}</td>
      <td><span class="method method-${r.method}">${r.method}</span></td>
      <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.url}</td>
      <td><span class="status-${Math.floor(r.response_status/100)}xx">${r.response_status}</span></td>
      <td>${r.latency_ms?.toFixed(0) || 0}ms</td>
    </tr>
  `).join('');
}

function renderPagination(data) {
  const { total, has_more, next_cursor } = data;
  document.getElementById('pagination-info').textContent = total ? `${total} total requests` : 'No results';
  const pages = document.getElementById('pagination-pages');
  let html = '';
  html += `<button ${cursorStack.length === 0 ? 'disabled' : ''} onclick="goPrev()">Prev</button>`;
  html += `<button ${!has_more ? 'disabled' : ''} onclick="goNext(${next_cursor})">Next</button>`;
  pages.innerHTML = html;
}

function goNext(nextCursor) {
  cursorStack.push(currentCursor);
  currentCursor = nextCursor;
  loadRequests();
}

function goPrev() {
  if (cursorStack.length > 0) {
    currentCursor = cursorStack.pop();
    loadRequests();
  }
}

async function showDetail(id) {
  const resp = await fetch('/api/requests/' + id);
  const r = await resp.json();
  const body = document.getElementById('detail-body');

  // Parse request and response bodies for annotation context
  let reqParsed = null, respParsed = null;
  try { reqParsed = JSON.parse(r.request_body); } catch(e) {}
  try { respParsed = JSON.parse(r.response_body); } catch(e) {}

  // Build usage summary for response if usage field exists
  let usageBar = '';
  if (respParsed && respParsed.usage) {
    usageBar = '<div class="usage-summary">' + renderUsageSummary(respParsed.usage) + '</div>';
  }

  body.innerHTML = `
    <div class="detail-section">
      <h3>General</h3>
      <pre>${r.method} ${r.url}\nStatus: ${r.response_status} | Latency: ${r.latency_ms?.toFixed(0)}ms</pre>
      <button class="copy-btn" onclick="copyCurl(${JSON.stringify(JSON.stringify(r)).replace(/"/g, '&quot;')})">Copy as curl</button>
    </div>
    <div class="detail-section">
      <h3>Request Headers</h3>
      <pre>${formatHeaders(r.request_headers)}</pre>
    </div>
    <div class="detail-section">
      <h3>Request Body</h3>
      ${formatBody(r.request_body, 'request')}
    </div>
    <div class="detail-section">
      <h3>Response Headers</h3>
      <pre>${formatHeaders(r.response_headers)}</pre>
    </div>
    <div class="detail-section">
      <h3>Response Body</h3>
      ${usageBar}${formatBody(r.response_body, 'response')}
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('active');
  // Initialize collapsible tree views after DOM insertion
  initBodyViewers();
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('active');
}

function formatHeaders(h) {
  if (!h) return '(none)';
  if (typeof h === 'string') { try { h = JSON.parse(h); } catch(e) { return h; } }
  return Object.entries(h).map(([k,v]) => `${k}: ${v}`).join('\n');
}

/* ========== JSON Viewer Utilities (Phase 2: T003-T005) ========== */

/** Escape HTML special characters for safe insertion (T003) */
function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/** Recursively render a JSON value as syntax-highlighted HTML string (T004) */
function highlightJsonString(value, indent) {
  const pad = '  '.repeat(indent);
  if (value === null) return `${pad}<span class="json-null">null</span>`;
  if (typeof value === 'boolean') return `${pad}<span class="json-boolean">${value}</span>`;
  if (typeof value === 'number') return `${pad}<span class="json-number">${value}</span>`;
  if (typeof value === 'string') return `${pad}<span class="json-string">"${escapeHtml(value)}"</span>`;

  if (Array.isArray(value)) {
    if (value.length === 0) return `${pad}[]`;
    const items = value.map(v => highlightJsonString(v, indent + 1));
    return `${pad}[\n${items.join(',\n')}\n${pad}]`;
  }

  if (typeof value === 'object') {
    const keys = Object.keys(value);
    if (keys.length === 0) return `${pad}{}`;
    const entries = keys.map(k =>
      `${pad}  <span class="json-key">"${escapeHtml(k)}"</span>: ${highlightJsonString(value[k], indent + 1).trim()}`
    );
    return `${pad}{\n${entries.join(',\n')}\n${pad}}`;
  }
  return pad + String(value);
}

/** Count lines in pretty-printed JSON for auto-collapse threshold (T005) */
function countJsonLines(value) {
  return highlightJsonString(value, 0).split('\n').length;
}

/* ========== Collapsible Tree (Phase 4: T009-T010) ========== */

const AUTO_COLLAPSE_THRESHOLD = 50;

/** Build a collapsible DOM tree node for a JSON value (T009) */
function renderJsonNode(value, key, depth, autoCollapse, context) {
  const wrapper = document.createElement('div');
  wrapper.className = 'json-node';

  const isObject = value !== null && typeof value === 'object';
  const isArray = Array.isArray(value);

  if (isObject || isArray) {
    const entries = isArray ? value : Object.entries(value);
    const childCount = isArray ? value.length : Object.keys(value).length;
    const openBrace = isArray ? '[' : '{';
    const closeBrace = isArray ? ']' : '}';

    // Header line: [toggle] key: openBrace
    const header = document.createElement('span');

    const toggle = document.createElement('span');
    toggle.className = 'json-toggle';
    header.appendChild(toggle);

    if (key !== null) {
      const keySpan = document.createElement('span');
      keySpan.className = 'json-key';
      keySpan.textContent = `"${key}": `;
      header.appendChild(keySpan);

      // Semantic annotation badge (T017)
      const ann = getAnnotation(key, context, value);
      if (ann) {
        const badge = document.createElement('span');
        badge.className = `json-badge ${ann.cssClass}`;
        badge.textContent = ann.text;
        header.appendChild(badge);
      }
    }

    const braceSpan = document.createElement('span');
    braceSpan.textContent = openBrace;
    header.appendChild(braceSpan);

    wrapper.appendChild(header);

    // Children container
    const children = document.createElement('div');
    children.className = 'json-children';

    const childEntries = isArray
      ? value.map((v, i) => [null, v])
      : Object.entries(value);

    childEntries.forEach(([k, v]) => {
      children.appendChild(renderJsonNode(v, k, depth + 1, autoCollapse, context));
    });

    wrapper.appendChild(children);

    // Close brace with summary
    const closeLine = document.createElement('span');
    const closeSpan = document.createElement('span');
    closeSpan.textContent = closeBrace;
    closeLine.appendChild(closeSpan);

    const summary = document.createElement('span');
    summary.className = 'json-summary';
    summary.textContent = ` ${childCount} ${isArray ? 'items' : 'keys'}`;
    closeLine.appendChild(summary);

    wrapper.appendChild(closeLine);

    // Auto-collapse logic
    const shouldCollapse = autoCollapse && depth >= 1;
    if (shouldCollapse) {
      children.style.display = 'none';
      toggle.textContent = '\u25B6'; // ▶
      closeLine.style.display = 'none';
    } else {
      toggle.textContent = '\u25BC'; // ▼
      closeLine.style.display = '';
    }

    // Store state for toggle
    wrapper._children = children;
    wrapper._toggle = toggle;
    wrapper._closeLine = closeLine;
    wrapper._summary = summary;
    wrapper._openBrace = openBrace;
    wrapper._closeBrace = closeBrace;
    wrapper._childCount = childCount;
  } else {
    // Leaf node
    if (key !== null) {
      const keySpan = document.createElement('span');
      keySpan.className = 'json-key';
      keySpan.textContent = `"${key}": `;
      wrapper.appendChild(keySpan);

      // Semantic annotation badge (T017)
      const ann = getAnnotation(key, context, value);
      if (ann) {
        const badge = document.createElement('span');
        badge.className = `json-badge ${ann.cssClass}`;
        badge.textContent = ann.text;
        wrapper.appendChild(badge);
      }
    }

    const valSpan = document.createElement('span');
    if (value === null) {
      valSpan.className = 'json-null';
      valSpan.textContent = 'null';
    } else if (typeof value === 'string') {
      valSpan.className = 'json-string';
      valSpan.textContent = `"${escapeHtml(value)}"`;
    } else if (typeof value === 'boolean') {
      valSpan.className = 'json-boolean';
      valSpan.textContent = String(value);
    } else {
      valSpan.className = 'json-number';
      valSpan.textContent = String(value);
    }
    wrapper.appendChild(valSpan);
  }

  return wrapper;
}

/** Toggle collapse/expand on a JSON node (T010) */
function toggleJsonNode(nodeEl) {
  if (!nodeEl._children) return;
  const isHidden = nodeEl._children.style.display === 'none';
  nodeEl._children.style.display = isHidden ? 'block' : 'none';
  nodeEl._toggle.textContent = isHidden ? '\u25BC' : '\u25B6';
  nodeEl._closeLine.style.display = isHidden ? '' : 'none';
}

/* ========== LLM Semantic Annotations (Phase 5: T014-T016) ========== */

/** Request-side annotation map (T014) */
const LLM_REQUEST_ANNOTATIONS = {
  model:                { badge: '\uD83C\uDFAF Target model', cssClass: 'json-badge-model' },
  messages:             { badge: '\uD83D\uDCAC Messages', cssClass: 'json-badge-messages', countField: true },
  stream:               { badge: '', cssClass: 'json-badge-stream', valueMap: { true: '\u26A1 Streaming', false: '\u23F9 Sync' } },
  temperature:          { badge: '\uD83C\uDF21\uFE0F Temperature', cssClass: 'json-badge-model' },
  max_tokens:           { badge: '\uD83D\uDCCF Max tokens', cssClass: 'json-badge-model' },
  max_completion_tokens:{ badge: '\uD83D\uDCCF Max completion tokens', cssClass: 'json-badge-model' },
  tools:                { badge: '\uD83D\uDD27 Tools', cssClass: 'json-badge-tool', countField: true },
  tool_choice:          { badge: '\uD83D\uDD27 Tool choice', cssClass: 'json-badge-tool' },
  system:               { badge: '\uD83D\uDCCB System prompt', cssClass: 'json-badge-system' },
};

/** Response-side annotation map (T015) */
const LLM_RESPONSE_ANNOTATIONS = {
  id:            { badge: '\uD83C\uDFF7\uFE0F ID' },
  model:         { badge: '\uD83C\uDFF7\uFE0F Model used' },
  choices:       { badge: '\uD83D\uDCDD Choices', cssClass: 'json-badge-messages', countField: true },
  usage:         { badge: '\uD83D\uDCCA Usage', cssClass: 'json-badge-usage' },
  stop_reason:   { badge: '\u23F9 Stop reason' },
  finish_reason: { badge: '\u23F9 Stop reason' },
};

/** Look up annotation for a field name in the given context (T016) */
function getAnnotation(fieldName, context, value) {
  const map = context === 'response' ? LLM_RESPONSE_ANNOTATIONS : LLM_REQUEST_ANNOTATIONS;
  const ann = map[fieldName];
  if (!ann) return null;

  let text = ann.badge;
  if (ann.countField && Array.isArray(value)) {
    text = `${ann.badge} (${value.length})`;
  } else if (ann.valueMap && ann.valueMap[value] !== undefined) {
    text = ann.valueMap[value];
  }
  if (!text) return null;
  return { text, cssClass: ann.cssClass || '' };
}

/** Render compact usage summary bar (T018) */
function renderUsageSummary(usage) {
  if (!usage) return '';
  // OpenAI format: prompt_tokens / completion_tokens / total_tokens
  // Anthropic format: input_tokens / output_tokens
  const parts = [];
  const input = usage.input_tokens ?? usage.prompt_tokens;
  const output = usage.output_tokens ?? usage.completion_tokens;
  const total = usage.total_tokens;
  if (input !== undefined) parts.push(`<span class="usage-item"><span class="usage-value">${input}</span> prompt</span>`);
  if (output !== undefined) parts.push(`<span class="usage-item"><span class="usage-value">${output}</span> completion</span>`);
  if (total !== undefined) parts.push(`<span class="usage-item"><span class="usage-value">${total}</span> total</span>`);
  if (parts.length === 0) return '';
  return 'Tokens: ' + parts.join(' / ');
}

/* ========== Body Viewer (T006, T012) ========== */

/** Render a body with syntax-highlighted tree view and raw toggle (T006, T012) */
function formatBody(b, context) {
  if (!b) return '<div class="body-empty">(empty)</div>';

  let parsed = null;
  let isValidJson = false;
  try {
    parsed = JSON.parse(b);
    isValidJson = true;
  } catch(e) {
    // Not valid JSON
  }

  if (!isValidJson) {
    return `<div class="body-raw"><pre>${escapeHtml(b)}</pre><div style="color:#8b949e;font-size:12px;margin-top:4px;">Content is not valid JSON</div></div>`;
  }

  // Valid JSON — build tree view + raw view with toggle
  const bodyId = 'body-' + Math.random().toString(36).slice(2, 8);

  // Determine auto-collapse: count lines in pretty-printed JSON
  const lineCount = countJsonLines(parsed);
  const autoCollapse = lineCount > AUTO_COLLAPSE_THRESHOLD;

  // Build raw view
  const rawHtml = `<pre>${highlightJsonString(parsed, 0)}</pre>`;

  // We build the tree container as a placeholder; actual DOM tree will be inserted via JS
  return `
    <div class="body-viewer" id="${bodyId}">
      <div class="body-viewer-toolbar">
        <button class="body-toggle active" data-view="tree" data-body-id="${bodyId}">Tree</button>
        <button class="body-toggle" data-view="raw" data-body-id="${bodyId}">Raw</button>
      </div>
      <div class="body-view-tree" data-body-id="${bodyId}" data-parsed='${escapeHtml(b)}' data-context="${context || ''}" data-auto-collapse="${autoCollapse}"></div>
      <div class="body-view-raw" data-body-id="${bodyId}" style="display:none">${rawHtml}</div>
    </div>
  `;
}

/** Initialize tree views after DOM insertion (called after showDetail) */
function initBodyViewers() {
  document.querySelectorAll('.body-view-tree').forEach(container => {
    const rawJson = container.getAttribute('data-parsed');
    const context = container.getAttribute('data-context') || '';
    const autoCollapse = container.getAttribute('data-auto-collapse') === 'true';
    try {
      const parsed = JSON.parse(rawJson);
      const tree = renderJsonNode(parsed, null, 0, autoCollapse, context);
      container.appendChild(tree);
    } catch(e) {
      container.innerHTML = '<pre>' + escapeHtml(rawJson) + '</pre>';
    }
  });
}

/* ========== Event Delegation (T011) ========== */

document.getElementById('detail-body').addEventListener('click', function(e) {
  // Handle json-toggle clicks
  const toggle = e.target.closest('.json-toggle');
  if (toggle) {
    const nodeEl = toggle.closest('.json-node');
    if (nodeEl) toggleJsonNode(nodeEl);
    return;
  }

  // Handle body-toggle (Tree/Raw) clicks
  const viewToggle = e.target.closest('.body-toggle');
  if (viewToggle) {
    const bodyId = viewToggle.getAttribute('data-body-id');
    const viewer = document.getElementById(bodyId);
    if (!viewer) return;
    const view = viewToggle.getAttribute('data-view');
    // Update active state
    viewer.querySelectorAll('.body-toggle').forEach(btn => btn.classList.remove('active'));
    viewToggle.classList.add('active');
    // Switch views
    const treeContainer = viewer.querySelector('.body-view-tree');
    const rawContainer = viewer.querySelector('.body-view-raw');
    if (view === 'tree') {
      treeContainer.style.display = '';
      rawContainer.style.display = 'none';
    } else {
      treeContainer.style.display = 'none';
      rawContainer.style.display = '';
    }
  }
});

/* ========== showDetail Update (T007, T019) ========== */
// showDetail already updated above to use formatBody(b, context) and initBodyViewers.

/* ========== Existing Functions ========== */

function copyCurl(rJson) {
  const r = JSON.parse(rJson);
  let curl = `curl -X ${r.method} '${r.url}'`;
  const headers = typeof r.request_headers === 'string' ? JSON.parse(r.request_headers) : r.request_headers;
  if (headers) {
    for (const [k, v] of Object.entries(headers)) {
      if (k.toLowerCase() !== 'host') curl += ` \\\n  -H '${k}: ${v}'`;
    }
  }
  if (r.request_body) curl += ` \\\n  -d '${r.request_body}'`;
  navigator.clipboard.writeText(curl);
}

function exportData(format) {
  const params = getParams().replace(/page=\d+&?/, '').replace(/per_page=\d+&?/, '');
  window.location.href = '/api/export?format=' + format + '&' + params;
}

function initChart() {
  const ctx = document.getElementById('latency-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Latency (ms)', data: [], borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.1)', fill: true, tension: 0.3 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } } } }
  });
}

function addToChart(req) {
  if (!chart) return;
  const label = req.method + ' ' + (req.url?.split('?')[0] || '');
  chart.data.labels.push(label);
  chart.data.datasets[0].data.push(req.latency_ms || 0);
  if (chart.data.labels.length > 50) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.update();
}

function connectSSE() {
  const es = new EventSource('/api/events');
  es.onmessage = (e) => {
    try {
      const req = JSON.parse(e.data);
      addToChart(req);
      if (currentCursor === 0 && !searchInput.value && !methodFilter.value && statusFilter.value === '0') {
        prependRow(req);
      }
    } catch (err) {}
  };
  es.onerror = () => { setTimeout(connectSSE, 5000); };
}

function prependRow(r) {
  const tbody = document.getElementById('requests-body');
  const empty = document.getElementById('empty-state');
  empty.style.display = 'none';
  const row = document.createElement('tr');
  row.onclick = () => showDetail(r.id);
  row.innerHTML = `
    <td>${r.id}</td>
    <td>${new Date(r.timestamp).toLocaleString()}</td>
    <td><span class="method method-${r.method}">${r.method}</span></td>
    <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.url}</td>
    <td><span class="status-${Math.floor(r.response_status/100)}xx">${r.response_status}</span></td>
    <td>${r.latency_ms?.toFixed(0) || 0}ms</td>
  `;
  tbody.insertBefore(row, tbody.firstChild);
  while (tbody.children.length > 50) {
    tbody.removeChild(tbody.lastChild);
  }
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });
initChart();
loadRequests();
connectSSE();
</script>
